<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Spokes AI Agents | Knowledge26 Lab</title><link rel="stylesheet" /><style>* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Outfit',sans-serif;
  background:#061525;
  color:#e8f4f8;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}

.header-img,
.footer-img {
  width:100%;
  display:block;
  flex-shrink:0;
}

.game-card {
  background:rgba(10,31,51,0.85);
  border:1px solid rgba(98,216,78,0.15);
  border-radius:12px;
  backdrop-filter:blur(8px);
  padding:32px 24px;
  max-width:400px;
  width:100%;
  box-shadow:0 0 20px rgba(98,216,78,0.25);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.game-title {
  font-size:2rem;
  font-weight:700;
  color:#62d84e;
  margin-bottom:16px;
  text-align:center;
}

.game-desc {
  color:#7a9bb5;
  font-size:1rem;
  margin-bottom:24px;
  text-align:center;
}

.release-btn {
  background:linear-gradient(135deg,#62d84e,#00c7b1);
  color:#061525;
  font-weight:700;
  border-radius:10px;
  padding:12px 24px;
  border:none;
  cursor:pointer;
  font-size:1.1rem;
  margin-bottom:18px;
  transition:transform 0.1s,box-shadow 0.1s;
}

.release-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 0 12px #62d84e;
}

.release-output {
  color:#e8f4f8;
  font-size:1.2rem;
  margin-bottom:12px;
  min-height:28px;
  text-align:center;
}

.score {
  color:#00c7b1;
  font-weight:600;
  font-size:1.1rem;
  margin-bottom:8px;
}

@media (max-width:600px) {
  .game-card {
    padding:18px 8px;
    max-width:98vw;
  }

  .game-title { font-size:1.3rem; }
}
</style></head><body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">ServiceNow Release Quiz 🧞</div>
      <div class="game-desc">Guess the year of a random ServiceNow release! Click below to start. Try to get as many correct as you can.</div>
      <div class="release-output" id="releaseOutput"></div>
      <input type="number" id="yearInput" style="background:rgba(6,21,37,0.8); border:1px solid rgba(98,216,78,0.2); color:#e8f4f8; border-radius:8px; padding:8px 12px; margin-bottom:12px; width:100%; max-width:180px; font-size:1rem;" />
      <button class="release-btn" id="submitBtn">Submit</button>
      <div class="score" id="scoreDisplay">Score: 0</div>
      <button class="release-btn" id="nextBtn" style="background:linear-gradient(135deg,#00c7b1,#62d84e); display:none;">Next Release</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  
</body></html>
